<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Icebreaker Bingo</title>

<!-- Confetti library -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background: #f5f5f5;
    }

    h1 {
        margin-top: 20px;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 10px;
        width: 90%;
        max-width: 800px;
        margin: 20px auto;
    }

    .cell {
        background: white;
        border: 2px solid #ccc;
        padding: 20px;
        cursor: pointer;
        border-radius: 10px;
        transition: 0.3s;
        font-size: 14px;
    }

    .cell.checked {
        background: purple;
        color: white;
        border-color: purple;
    }
</style>
</head>

<body>

<h1> 🪸 تبادل المرجان 🪸 </h1>
<p>ابحث عن شخص يحقق المطلوب </p>

<div class="grid" id="bingoGrid"></div>

<script>
const questions = [
    "شخص  عنده مشروع او يفكر يبدا مشروع",
    "شخص غيّر مساره المهني",
    "شخص يعمل أو يدرس في مجال التقنية (حاسب، برمجة، أمن سيبراني، ذكاء اصطناعي...) 💻",
    "شخص يدرس/درس الماجستير",
    "شخص درس تخصص ما يحبه",
    "دوري على شهد الظاهري وقولي لها مبروك التخرج",
    "شخص يعمل عن بعد",
    "شخص جرّب العمل الحر (Freelancing)", 
    "شخص يستخدم الذكاء الاصطناعي بكثرة",
    "شخص يعمل أو يدرس في مجال الأعمال والمالية (إدارة، محاسبة، مالية، استثمار...) 💰",
    "شخص عنده حساب ينشر فيه شغله أو أفكاره",   
    "شخص تعلّم مهارة من الإنترنت",  
    "شخص عنده مشروع ما اكتمل لسه",
    "خلي الشخص الي امامك يشارك حساب مرجان مع ثلاث من الاصدقاء في انستقرام",
    "شخص يتابع بودكاست بشكل مستمر",
    "شخص حمّل كورس وما كمله",
    "شخص يعمل أو يدرس في مجال إبداعي (تصميم، تصوير، صناعة محتوى، إعلام، تسويق...) 🎨",
    "شخص جرّب شيء خارج منطقة الراحة",
    "شخص التزم بعادة جديدة (حتى لو بسيطة)",
    "شخص يحب وظيفته أو تخصصه بالجامعة",
    "شخص شرب موية اليوم أكثر من القهوة",
    "شخص يحاول يقلل من استخدام الجوال ومواقع التواصل الاجتماعي",
    "شخص يعمل أو يدرس في مجال تخصصي أو مهني (صحة، هندسة، قانون، تعليم، علوم...) 🏥",
    "شخص نقل لمدينة للعمل او الدراسة",
    "شخص حضر كل لقاءات مرجان❤️"

];

const grid = document.getElementById("bingoGrid");

questions.forEach(q => {
    const cell = document.createElement("div");
    cell.classList.add("cell");
    cell.innerText = q;

    cell.addEventListener("click", () => {
        cell.classList.toggle("checked");
        checkBingo();
    });

    grid.appendChild(cell);
});

function launchConfetti() {
    const duration = 2 * 1000;
    const end = Date.now() + duration;

    (function frame() {
        confetti({
            particleCount: 6,
            spread: 70,
            origin: { y: 0.6 }
        });

        if (Date.now() < end) {
            requestAnimationFrame(frame);
        }
    })();
}

// ✅ NEW WIN LOGIC
let hasWon = false;

function checkBingo() {
    const cells = document.querySelectorAll(".cell");
    const checkedCount = Array.from(cells)
        .filter(c => c.classList.contains("checked")).length;

    if (checkedCount >= 16 && !hasWon) {
        hasWon = true;
        alert("💓تم تبادل المرجان بنجاح");
        launchConfetti();
    }
}
</script>

</body>
</html>
