<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Icebreaker Bingo</title>

<!-- Confetti library -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background: #f5f5f5;
    }

    h1 {
        margin-top: 20px;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 10px;
        width: 90%;
        max-width: 800px;
        margin: 20px auto;
    }

    .cell {
        background: white;
        border: 2px solid #ccc;
        padding: 20px;
        cursor: pointer;
        border-radius: 10px;
        transition: 0.3s;
        font-size: 14px;
    }

    .cell.checked {
        background: purple;
        color: white;
        border-color: purple;
    }
</style>
</head>

<body>

<h1>تبادل المرجان</h1>
<p>ابحث عن شخص يحقق المطلوب </p>

<div class="grid" id="bingoGrid"></div>

<script>
const questions = [
    "Find someone who works in fintech",
    "Find someone who loves AI",
    "Find someone who codes daily",
    "Find someone who attended more than 3 panels",
    "Find someone who traveled abroad this year",

    "Find someone who runs a business",
    "Find someone who loves public speaking",
    "Find someone who uses Notion",
    "Find someone who is into startups",
    "Find someone who works remotely",

    "Find someone who studied abroad",
    "Find someone who is a content creator",
    "Find someone who listens to podcasts",
    "Find someone who enjoys networking",
    "Find someone who is into cybersecurity",

    "Find someone who is building an app",
    "Find someone who uses LinkedIn actively",
    "Find someone who loves coffee",
    "Find someone who attends tech events",
    "Find someone who wants to work in Silicon Valley",

    "Find someone who wakes up early",
    "Find someone who prefers remote work",
    "Find someone who enjoys reading",
    "Find someone who is learning something new",
    "Find someone who loves innovation"
];

const grid = document.getElementById("bingoGrid");

questions.forEach(q => {
    const cell = document.createElement("div");
    cell.classList.add("cell");
    cell.innerText = q;

    cell.addEventListener("click", () => {
        cell.classList.toggle("checked");
        checkBingo();
    });

    grid.appendChild(cell);
});

function launchConfetti() {
    const duration = 2 * 1000;
    const end = Date.now() + duration;

    (function frame() {
        confetti({
            particleCount: 6,
            spread: 70,
            origin: { y: 0.6 }
        });

        if (Date.now() < end) {
            requestAnimationFrame(frame);
        }
    })();
}

// ✅ NEW WIN LOGIC
let hasWon = false;

function checkBingo() {
    const cells = document.querySelectorAll(".cell");
    const checkedCount = Array.from(cells)
        .filter(c => c.classList.contains("checked")).length;

    if (checkedCount >= 16 && !hasWon) {
        hasWon = true;
        alert("تم تبادل المرجان بنجاح");
        launchConfetti();
    }
}
</script>

</body>
</html>
